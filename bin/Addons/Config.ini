[chrlauncher]

# Core launcher/runtime configuration. Browser command-line switches are in Parameters.ini.
# Chromium version/channel/update selection is in Version.ini.

# Chromium executable file name (string):
ChromiumBinary=chrome.exe

# Chromium binaries directory (string):
# Relative to launcher directory or absolute path. With bin/chrlauncher.x64.exe use '.'.
ChromiumDirectory=.

# A DLL hijack implements Chrome full portability as well as tab enhancements.
# https://github.com/Bush2021/chrome_plus
ChromePlusDirectory=Addons\chrome_plus

# Repair pinned taskbar shortcuts that point directly to Chromium (boolean):
ChromiumRepairTaskbarPins=true

# Use Chromium's last used profile when launcher starts from taskbar without URL (boolean):
ChromiumUseLastProfileOnTaskbarLaunch=true

# Show Chromium profile picker when launcher starts without URL and no last profile can be resolved (boolean):
ChromiumShowProfilePickerOnTaskbarLaunch=true

# Launcher worker threads: 0=auto clamp 1..4, or explicit 1..4.
LauncherWorkQueueThreads=0

# Start browser when downloading and installing is over (boolean):
ChromiumRunAtEnd=true

# Delete Chromium directory to recycle bin when installing update (boolean):
ChromiumDeleteToRecycle=true

# Last cached update checking timestamp (integer). Runtime-updated by launcher.
ChromiumLastCheck=0

# Internal settings (SDK):
AlwaysOnTop=false
