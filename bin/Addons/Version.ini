[chrlauncher]

# Chromium version/channel/update selection only.

# Custom Chromium update URL. Keep %d for architecture and %s for ChromiumType.
ChromiumUpdateUrl=https://chromium.woolyss.com/api/v3/?os=windows&bit=%d&type=%s&out=string

# Set Chromium binaries architecture:
# 0 -> autodetect, 64 -> 64-bit, 32 -> 32-bit
ChromiumArchitecture=0

# Auto download updates if found.
ChromiumAutoDownload=false

# Bring chrlauncher window when download starts.
ChromiumBringToFront=true

# Start browser only when check/download/install completes.
ChromiumWaitForDownloadEnd=true

# Use chrlauncher as updater only; do not start Chromium.
ChromiumUpdateOnly=false

# Type of Chromium build:
# dev-official        -> official development snapshots
# stable-codecs-sync  -> unofficial stable builds with codecs
# dev-nosync          -> unofficial development builds without Google services
# dev-codecs-sync     -> unofficial development builds with codecs
# dev-codecs-nosync   -> unofficial development builds with codecs, no sync
# ungoogled-chromium  -> privacy-focused ungoogled builds
ChromiumType=dev-official

# Check for a new Chromium version once per X days: 2=default, 0=disable, -1=force.
ChromiumCheckPeriod=2
