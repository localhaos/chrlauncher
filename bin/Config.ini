[chrlauncher]
# ============================================================================
# CHRLAUNCHER PORTABLE CONFIG - ONE FILE LAYOUT
# ============================================================================
# Primary launchbro-style layout:
#   chrlauncher.x64.exe
#   Config.ini
#   bin\chrome.exe
#   profile\
#
# Relative paths are resolved from the launcher directory.
# ============================================================================

# ============================================================================
# CORE
# ============================================================================
ChromiumBinary=chrome.exe
ChromiumDirectory=.\bin
ChromiumLastCheck=0
ChromiumRunAtEnd=true
ChromiumDeleteToRecycle=true
ChromePlusDirectory=Addons\chrome_plus
AlwaysOnTop=false
LauncherWorkQueueThreads=0

# ============================================================================
# VERSION / UPDATE
# ============================================================================
ChromiumUpdateUrl=https://chromium.woolyss.com/api/v3/?os=windows&bit=%d&type=%s&out=string
ChromiumArchitecture=0
ChromiumAutoDownload=false
ChromiumBringToFront=true
ChromiumWaitForDownloadEnd=true
ChromiumUpdateOnly=false
ChromiumType=dev-official
ChromiumCheckPeriod=2

# ============================================================================
# PARAMETERS
# ============================================================================
ChromiumCommandLine=--flag-switches-begin --user-data-dir=..\profile --no-default-browser-check --disable-logging --no-report-upload --flag-switches-end

# ============================================================================
# TASKBAR / PROFILE
# ============================================================================
ChromiumRepairTaskbarPins=true
ChromiumUseLastProfileOnTaskbarLaunch=true
ChromiumShowProfilePickerOnTaskbarLaunch=true

# ============================================================================
# SPOOFING
# ============================================================================
ChromiumSpoofRegion=false
ChromiumSpoofUseWindowsLocale=true
ChromiumSpoofRegionLocale=
ChromiumSpoofRegionAcceptLanguage=
ChromiumSpoofGeolocation=false
ChromiumSpoofGeolocationCommandLine=
ChromiumSpoofTimeZone=false
ChromiumSpoofTimeZoneId=
ChromiumSpoofTimeZoneCommandLine=
ChromiumSpoofHardwareId=false
ChromiumSpoofHardwareIdCommandLine=

# ============================================================================
# PERFORMANCE / GPU
# ============================================================================
ChromiumEnableLosslessOptimization=false
ChromiumLosslessOptimizationCommandLine=
ChromiumLosslessOptimizationFeatures=
ChromiumEnableTextPerformanceFixes=false
ChromiumTextPerformanceCommandLine=
ChromiumTextPerformanceDisableFeatures=
ChromiumEnableAggressiveTextPerformanceFixes=false
ChromiumAggressiveTextPerformanceCommandLine=
ChromiumEnableBackgroundResourceSaving=false
ChromiumBackgroundResourceSavingCommandLine=
ChromiumBackgroundResourceSavingFeatures=
ChromiumEnableRendererSafety=false
ChromiumRendererSafetyCommandLine=
ChromiumEnableWindows11Features=false
ChromiumWindows11CommandLine=
ChromiumWindows11Features=
ChromiumEnableDirectX=false
ChromiumDirectXCommandLine=
ChromiumEnableVulkan=false
ChromiumVulkanCommandLine=
ChromiumVulkanFeatures=
ChromiumEnableMultithreadedRaster=false
ChromiumMultithreadingCommandLine=
ChromiumIgnoreGpuBlocklist=false
ChromiumIgnoreGpuBlocklistCommandLine=
ChromiumEnableHardwareAcceleration=true
ChromiumHardwareAccelerationCommandLine=

# ============================================================================
# UI / EXTENSIONS
# ============================================================================
ChromiumEnableScrollableTabs=false
ChromiumScrollableTabsFeatures=
ChromiumEnableCloseTabsRightExtension=false
ChromiumCloseTabsRightExtensionDirectory=Addons\close_tabs_right
ChromiumEnableAutofillPasswordFixes=false
ChromiumAutofillPasswordCommandLine=
ChromiumEnableGoogleWebStoreFix=false
ChromiumGoogleWebStoreCommandLine=
ChromiumGoogleWebStoreDisableFeatures=
ChromiumEnableCast=false
ChromiumCastCommandLine=
ChromiumCastFeatures=
ChromiumCastDisableFeatures=

# ============================================================================
# NETWORK / DNSBLOCK
# ============================================================================
ChromiumEnableQuic=true
ChromiumQuicCommandLine=
ChromiumEnableDnsOptions=false
ChromiumDnsCommandLine=
ChromiumEnableSecureDns=false
ChromiumSecureDnsUrl=
ChromiumEnableDnsBlocklistUrl=false
ChromiumDnsBlocklistUrl=
ChromiumDnsBlocklistCache=true
ChromiumDnsBlocklistCacheDirectory=Addons\dns_cache
ChromiumDnsBlocklistCacheMaxAgeHours=24
ChromiumDnsBlocklistSink=0.0.0.0
ChromiumDnsBlocklistIncludeSubdomains=true
ChromiumDnsBlocklistMaxRules=64
ChromiumDnsBlocklistMaxCommandLineChars=4096

# ============================================================================
# SDK / OPTIONAL
# ============================================================================
#UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36
#Proxy=127.0.0.1:80

[chrlauncher.x86]
ChromiumBinary=chrome.exe
ChromiumDirectory=.\bin
ChromiumArchitecture=32
ChromiumCommandLine=--flag-switches-begin --user-data-dir=..\profile --no-default-browser-check --disable-logging --no-report-upload --flag-switches-end
ChromiumRunAtEnd=true
ChromiumAutoDownload=false
ChromiumBringToFront=true
ChromiumWaitForDownloadEnd=true
ChromiumUpdateOnly=false
ChromiumType=dev-official
ChromiumCheckPeriod=2

[chrlauncher.x64]
ChromiumBinary=chrome.exe
ChromiumDirectory=.\bin
ChromiumArchitecture=64
ChromiumCommandLine=--flag-switches-begin --user-data-dir=..\profile --no-default-browser-check --disable-logging --no-report-upload --flag-switches-end
ChromiumRunAtEnd=true
ChromiumAutoDownload=false
ChromiumBringToFront=true
ChromiumWaitForDownloadEnd=true
ChromiumUpdateOnly=false
ChromiumType=dev-official
ChromiumCheckPeriod=2
