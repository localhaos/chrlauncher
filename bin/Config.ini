[chrlauncher]

# FINAL ONE-FILE PORTABLE CONFIG
# Layout:
#   chrlauncher.x64.exe
#   Config.ini
#   bin\chrome.exe
#   Data\
#   Cache\
#   addons\

# CORE
ChromiumBinary=chrome.exe
ChromiumDirectory=.\bin
ChromiumCommandLine=--flag-switches-begin --test-type --user-data-dir=..\Data --disk-cache-dir=..\Cache --no-default-browser-check --disable-logging --no-report-upload --disable-background-networking --disable-domain-reliability --disable-features=HardwareMediaKeyHandling,GlobalMediaControls --flag-switches-end
LauncherWorkQueueThreads=0
AlwaysOnTop=false

# TASKBAR / PROFILE
ChromiumRepairTaskbarPins=false
ChromiumUseLastProfileOnTaskbarLaunch=true
ChromiumShowProfilePickerOnTaskbarLaunch=true

# UPDATE / VERSION
ChromiumArchitecture=64
ChromiumAutoDownload=false
ChromiumBringToFront=true
ChromiumWaitForDownloadEnd=true
ChromiumUpdateOnly=false
ChromiumType=stable-codecs-sync
ChromiumCheckPeriod=2
ChromiumLastCheck=1783343776
ChromiumRunAtEnd=true
ChromiumDeleteToRecycle=true

# SECURE DNS / RETHINKDNS
ChromiumEnableSecureDns=true
ChromiumSecureDnsUrl=https://sky.rethinkdns.com/1:gIAAgBgA

# DNS BLOCKLIST TEXT LISTS ONLY
# Local Turtlecute host list removes network dependency at launcher startup.
# Generated --host-resolver-rules are cached by config hash in .\addons\dnsblock.
ChromiumEnableDnsBlocklistUrl=true
ChromiumDnsBlocklistUrl=.\addons\dnsblock\d3host.txt
ChromiumDnsBlocklistCache=true
ChromiumDnsBlocklistCacheDirectory=.\addons\dnsblock
ChromiumDnsBlocklistCacheMaxAgeHours=24
ChromiumDnsBlocklistSink=0.0.0.0
ChromiumDnsBlocklistIncludeSubdomains=true
ChromiumDnsBlocklistMaxRules=512
ChromiumDnsBlocklistMaxCommandLineChars=20000

# NETWORK
ChromiumEnableQuic=false
ChromiumQuicCommandLine=--enable-quic
ChromiumEnableDnsOptions=false
ChromiumDnsCommandLine=--enable-async-dns

# SPOOFING
ChromiumSpoofRegion=false
ChromiumSpoofUseWindowsLocale=false
ChromiumSpoofRegionLocale=en-US
ChromiumSpoofRegionAcceptLanguage=en-US,en
ChromiumSpoofGeolocation=false
ChromiumSpoofGeolocationCommandLine=
ChromiumSpoofTimeZone=false
ChromiumSpoofTimeZoneId=Europe/Warsaw
ChromiumSpoofTimeZoneCommandLine=--time-zone-for-testing=
ChromiumSpoofHardwareId=false
ChromiumSpoofHardwareIdCommandLine=

# PERFORMANCE / GPU
ChromiumEnableLosslessOptimization=true
ChromiumLosslessOptimizationCommandLine=
ChromiumLosslessOptimizationFeatures=ParallelDownloading
ChromiumEnableTextPerformanceFixes=true
ChromiumTextPerformanceCommandLine=--disable-translate --skia-font-cache-limit-mb=64 --skia-resource-cache-limit-mb=128
ChromiumTextPerformanceDisableFeatures=
ChromiumEnableAggressiveTextPerformanceFixes=false
ChromiumAggressiveTextPerformanceCommandLine=--disable-renderer-accessibility --disable-remote-fonts --disable-font-subpixel-positioning --disable-smooth-scrolling
ChromiumEnableBackgroundResourceSaving=false
ChromiumBackgroundResourceSavingCommandLine=
ChromiumBackgroundResourceSavingFeatures=IntensiveWakeUpThrottling,CalculateNativeWinOcclusion
ChromiumEnableRendererSafety=false
ChromiumRendererSafetyCommandLine=--site-per-process --js-flags=--stack_size=512
ChromiumEnableWindows11Features=false
ChromiumWindows11CommandLine=
ChromiumWindows11Features=Windows11MicaTitlebar
ChromiumEnableDirectX=false
ChromiumDirectXCommandLine=--use-angle=d3d11
ChromiumEnableVulkan=false
ChromiumVulkanCommandLine=--use-vulkan=native
ChromiumVulkanFeatures=Vulkan
ChromiumEnableMultithreadedRaster=false
ChromiumMultithreadingCommandLine=--num-raster-threads=4
ChromiumIgnoreGpuBlocklist=true
ChromiumIgnoreGpuBlocklistCommandLine=--ignore-gpu-blocklist
ChromiumEnableHardwareAcceleration=false
ChromiumHardwareAccelerationCommandLine=--enable-gpu-rasterization --enable-zero-copy

# UI / EXTENSIONS
ChromiumEnableScrollableTabs=true
# Medium-width scrollable tabs. Multiple parameter names are kept for compatibility
# with different Chromium flag/variation builds; unknown parameters are ignored.
ChromiumScrollableTabsFeatures=ScrollableTabStrip:minimum_tab_width/72/tab_width/medium/scrollable_tabstrip_min_width/72,ScrollableTabStripWithDragging
ChromiumEnableCloseTabsRightExtension=true
ChromiumCloseTabsRightExtensionDirectory=.\addons\extensions\close-tabs-right
ChromiumEnableAutofillPasswordFixes=true
ChromiumAutofillPasswordCommandLine=--ignore-autocomplete-off-autofill --enable-single-click-autofill --enable-password-generation
ChromePlusDirectory=.\addons\chrome_plus

# DEVTOOLS / AUDIO STABILITY
# Prevent media-key/global-media UI from interfering with DevTools on heavy pages while audio is active.
# Kept in ChromiumCommandLine and protected by Addons\optimizer_guard.

# OPTIMIZER GUARD
# Addons\optimizer_guard\optimizer_guard.ini reapplies protected performance settings on every launcher startup.

# GOOGLE WEB STORE / CHROME DETECTION
# This reduces generic Chromium detection. It cannot add missing Google Chrome system components.
ChromiumEnableGoogleWebStoreFix=true
ChromiumGoogleWebStoreCommandLine=--user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36" --disable-blink-features=UserAgentClientHint --google-base-url=https://www.google.com/ --apps-gallery-url=https://chromewebstore.google.com/ --apps-gallery-update-url=https://clients2.google.com/service/update2/crx --apps-gallery-download-url="https://clients2.google.com/service/update2/crx?response=redirect&prodversion=150.0&x=id=%s&installsource=ondemand&uc"
ChromiumGoogleWebStoreDisableFeatures=UserAgentClientHint,UserAgentClientHints

# Optional Chromebook-style UA for manual experiments only. Do not enable both.
#ChromiumGoogleWebStoreCommandLine=--user-agent="Mozilla/5.0 (X11; CrOS x86_64 14541.0.0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36" --disable-blink-features=UserAgentClientHint --google-base-url=https://www.google.com/ --apps-gallery-url=https://chromewebstore.google.com/ --apps-gallery-update-url=https://clients2.google.com/service/update2/crx --apps-gallery-download-url="https://clients2.google.com/service/update2/crx?response=redirect&prodversion=150.0&x=id=%s&installsource=ondemand&uc"

# CAST
ChromiumEnableCast=true
ChromiumCastCommandLine=--enable-media-router --load-media-router-component-extension
ChromiumCastFeatures=MediaRouter,CastAllowAllIPs,AllowAllSitesToInitiateMirroring,DialMediaRouteProvider,FallbackToAudioTabMirroring
ChromiumCastDisableFeatures=DelayMediaSinkDiscovery

# OPTIONAL SDK
#UserAgent=
#Proxy=
