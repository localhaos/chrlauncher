name: Windows build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: windows-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        platform:
          - Win32
          - x64
        include:
          - platform: Win32
            artifact-name: chrlauncher-x86
            exe-name: chrlauncher.x86.exe
          - platform: x64
            artifact-name: chrlauncher-x64
            exe-name: chrlauncher.x64.exe

    steps:
      - name: Checkout chrlauncher
        uses: actions/checkout@v4
        with:
          path: x
          submodules: false
          fetch-depth: 1

      - name: Checkout routine dependency
        uses: actions/checkout@v4
        with:
          repository: henrypp/routine
          path: routine
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Detect usable MSVC toolset
        id: toolset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe not found: $vswhere"
          }

          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) {
            throw 'Visual Studio C++ tools were not found on the runner.'
          }

          $vcTargetsRoot = Join-Path $installPath 'MSBuild\Microsoft\VC'
          $toolset = $null

          foreach ($candidate in @('v145', 'v143')) {
            $match = Get-ChildItem -LiteralPath $vcTargetsRoot -Recurse -Filter Toolset.props -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*PlatformToolsets\$candidate\Toolset.props" } |
              Select-Object -First 1

            if ($match) {
              $toolset = $candidate
              break
            }
          }

          if (-not $toolset) {
            throw "Neither v145 nor v143 C++ platform toolset is installed under $vcTargetsRoot"
          }

          "MSVC_TOOLSET=$toolset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "toolset=$toolset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "Selected MSVC platform toolset: $toolset"

      - name: Validate project files
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($path in @('chrlauncher.sln', 'chrlauncher.vcxproj', 'Directory.Build.props', 'src/app_config.c', 'src/app_paths.c', 'src/app_dns.c', 'tools/prepare-dns-fastcache.ps1', 'tools/validate-addons.ps1')) {
            if (-not (Test-Path -LiteralPath $path)) {
              Get-ChildItem -Force | Format-Table Mode, Length, Name
              throw "$path missing from checkout path x"
            }
          }

      - name: Validate addons
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          .\tools\validate-addons.ps1

      - name: Prepare DNS fast cache source
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          .\tools\prepare-dns-fastcache.ps1

      - name: Build
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path (Join-Path $PWD 'bin') | Out-Null
          $log = Join-Path $PWD 'bin\msbuild-${{ matrix.platform }}.log'
          msbuild chrlauncher.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:PreferredToolArchitecture=x64 `
            /p:PlatformToolset=$env:MSVC_TOOLSET `
            /verbosity:minimal `
            /fileLogger `
            /fileLoggerParameters:"LogFile=$log;Verbosity=normal;Encoding=UTF-8"

      - name: Verify output
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $PWD 'bin'
          $exe = Join-Path $bin '${{ matrix.exe-name }}'
          if (-not (Test-Path -LiteralPath $exe)) {
            Get-ChildItem -Path $bin -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
            throw '${{ matrix.exe-name }} was not produced in bin root.'
          }

          foreach ($path in @(
            'Config.ini',
            'Addons\extensions\close-tabs-right\manifest.json',
            'Addons\cf_manual_helper\manifest.json',
            'Addons\optimizer_guard\optimizer_guard.ini',
            'Addons\slurg\index.html',
            'Addons\src\README.md'
          )) {
            $full = Join-Path $bin $path
            if (-not (Test-Path -LiteralPath $full)) {
              throw "Artifact layout missing $path"
            }
          }

          foreach ($obsolete in @(
            'Addons\Config.ini',
            'Addons\Parameters.ini',
            'Addons\Version.ini',
            'Addons\extensions\close-tabs-right\cf_manual_helper.js',
            'Addons\extensions\close-tabs-right\slurg.html'
          )) {
            $full = Join-Path $bin $obsolete
            if (Test-Path -LiteralPath $full) {
              throw "Obsolete artifact file still present: $obsolete"
            }
          }

          Get-Item -LiteralPath $exe | Format-List FullName, Length, LastWriteTimeUtc

      - name: Generate artifact manifest
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $PWD 'bin'
          $manifest = Join-Path $bin 'artifact-manifest-${{ matrix.platform }}.txt'
          $hashes = Join-Path $bin 'artifact-sha256-${{ matrix.platform }}.txt'
          $files = Get-ChildItem -LiteralPath $bin -Recurse -File |
            Where-Object { $_.Name -notlike 'msbuild-*.log' } |
            Sort-Object FullName

          "platform=${{ matrix.platform }}" | Set-Content -LiteralPath $manifest -Encoding UTF8
          "exe=${{ matrix.exe-name }}" | Add-Content -LiteralPath $manifest -Encoding UTF8
          "head_sha=${{ github.sha }}" | Add-Content -LiteralPath $manifest -Encoding UTF8
          "generated_utc=$((Get-Date).ToUniversalTime().ToString('o'))" | Add-Content -LiteralPath $manifest -Encoding UTF8
          "" | Add-Content -LiteralPath $manifest -Encoding UTF8
          "relative_path`tbytes`tsha256" | Add-Content -LiteralPath $manifest -Encoding UTF8

          foreach ($file in $files) {
            $relative = [IO.Path]::GetRelativePath($bin, $file.FullName).Replace('/', '\')
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            "$relative`t$($file.Length)`t$hash" | Add-Content -LiteralPath $manifest -Encoding UTF8
            "$hash  $relative" | Add-Content -LiteralPath $hashes -Encoding UTF8
          }

          Get-Content -LiteralPath $manifest -TotalCount 40

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chrlauncher-${{ matrix.platform }}-diagnostics
          path: |
            x/bin/msbuild-${{ matrix.platform }}.log
            x/bin/**/*.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            x/bin/${{ matrix.exe-name }}
            x/bin/Config.ini
            x/bin/artifact-manifest-${{ matrix.platform }}.txt
            x/bin/artifact-sha256-${{ matrix.platform }}.txt
            x/bin/Addons/**
          if-no-files-found: error
          retention-days: 90
