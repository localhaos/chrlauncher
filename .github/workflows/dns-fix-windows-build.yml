name: DNS fix Windows build

on:
  push:
    branches:
      - fix/**
  workflow_dispatch:

jobs:
  build:
    name: DNS fix x64 build
    runs-on: windows-latest

    steps:
      - name: Checkout chrlauncher
        uses: actions/checkout@v4
        with:
          path: x
          submodules: false

      - name: Checkout routine dependency
        uses: actions/checkout@v4
        with:
          repository: henrypp/routine
          path: routine

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Apply source fixes
        shell: pwsh
        working-directory: x
        run: .\tools\prepare-v7-dns-fixes.ps1

      - name: Build x64
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          msbuild chrlauncher.sln /m /p:Configuration=Release /p:Platform=x64 /p:PreferredToolArchitecture=x64 /verbosity:minimal

      - name: Verify output
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path (Join-Path $PWD 'bin') 'chrlauncher.x64.exe'
          if (-not (Test-Path -LiteralPath $exe)) { throw 'chrlauncher.x64.exe was not produced.' }
          Get-Item -LiteralPath $exe | Format-List FullName, Length, LastWriteTimeUtc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrlauncher-v7-dnsfix-x64
          path: |
            x/bin/chrlauncher.x64.exe
            x/bin/Addons/**
          if-no-files-found: error
